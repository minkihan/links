<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Links</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface-2: #2c2c2c;
    --border: #383838;
    --border-hover: #4a4a4a;
    --text: #e0e0e0;
    --text-dim: #999;
    --text-muted: #666;
    --accent: #fbbf24;
    --link: #7eb8ff;
    --link-hover: #a0d0ff;
    --danger: #f85149;
    --green: #2d9a46;
    --green-hover: #3aad57;
    --input-bg: #1e1e1e;
  }

  body {
    font-family: 'D2CodingLigature Nerd Font', 'D2CodingLigature Nerd Font Propo', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; justify-content: center;
  }
  .topbar h1 {
    font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700;
    color: #f5f5f5; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap;
  }
  .search-box { flex: 1; max-width: 420px; position: relative; }
  .search-box input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px 8px 34px; color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 300; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); font-weight: 300; }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px; pointer-events: none;
  }
  .kbd {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 6px; font-size: 11px; color: var(--text-muted);
    font-family: 'Oswald', monospace; pointer-events: none;
  }
  .btn-add {
    background: var(--green); color: #fff; border: none; border-radius: 6px;
    padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 400;
    cursor: pointer; white-space: nowrap; transition: background 0.15s; letter-spacing: 0.5px;
  }
  .btn-add:hover { background: var(--green-hover); }

  /* Stat bar */
  .stat-bar {
    display: flex; justify-content: center; gap: 24px;
    padding: 10px 24px; border-bottom: 1px solid var(--border);
  }
  .stat-item { display: flex; align-items: baseline; gap: 6px; }
  .stat-value { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px; }

  /* Main grid */
  .main { padding: 20px 24px 40px; max-width: 1400px; margin: 0 auto; }
  .grid-header { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .btn-add-cat {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 4px 12px; font-family: 'Oswald', sans-serif;
    font-size: 0.75rem; letter-spacing: 1px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-add-cat:hover { border-color: var(--accent); color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

  /* Card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border-hover); }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .card-header:hover { background: var(--surface-2); }
  .card-title {
    font-family: 'Oswald', sans-serif; font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
  }
  .card-right { display: flex; align-items: center; gap: 8px; }
  .badge { font-family: 'Oswald', sans-serif; font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }
  .chevron { color: var(--text-muted); font-size: 10px; transition: transform 0.2s; }
  .card.collapsed .chevron { transform: rotate(-90deg); }
  .card.collapsed .card-body { display: none; }
  .card.collapsed .card-header { border-bottom-color: transparent; }

  /* Card body */
  .card-body { padding: 8px 12px 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }

  /* Link chip */
  .link-chip {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 5px; aspect-ratio: 1; padding: 6px;
    transition: border-color 0.15s, background 0.15s;
    position: relative; cursor: grab; overflow: hidden;
  }
  .link-chip:hover { border-color: var(--border-hover); background: #343434; }
  .link-chip.dragging { opacity: 0.3; cursor: grabbing; }
  .link-chip img.favicon {
    width: 20px; height: 20px; border-radius: 3px; margin-bottom: 4px;
    image-rendering: auto; flex-shrink: 0;
  }
  .link-chip a {
    color: var(--link); text-decoration: none; font-size: 11px; font-weight: 300;
    overflow: hidden; text-overflow: ellipsis; text-align: center;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    word-break: break-word; overflow-wrap: break-word; line-height: 1.3; transition: color 0.15s;
  }
  .link-chip a:hover { color: var(--link-hover); }
  .link-actions {
    position: absolute; top: 3px; right: 3px;
    display: flex; gap: 1px; opacity: 0; transition: opacity 0.15s;
  }
  .link-chip:hover .link-actions { opacity: 1; }
  .link-actions button {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    padding: 1px 4px; border-radius: 3px; font-size: 11px; line-height: 1;
  }
  .link-actions button:hover { background: var(--border); color: var(--text); }
  .link-actions button.del:hover { color: var(--danger); }

  /* Sub-card */
  .sub-card {
    grid-column: 1 / -1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin-top: 2px;
  }
  .sub-card .card-header { padding: 6px 10px; background: #1e1e1e; border-bottom: 1px solid #2a2a2a; }
  .sub-card .card-header:hover { background: #262626; }
  .sub-card .card-title { font-size: 0.7rem; letter-spacing: 1.5px; color: #a78bfa; }
  .sub-card .badge { font-size: 0.65rem; }
  .sub-card .chevron { font-size: 9px; }
  .sub-card .card-body {
    padding: 6px 8px 8px; background: #1c1c1c;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .sub-card.collapsed .card-body { display: none; }
  .sub-card.collapsed .card-header { border-bottom-color: transparent; }
  .sub-card .eject-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 11px; padding: 1px 4px; border-radius: 3px;
    opacity: 0; transition: opacity 0.15s;
  }
  .sub-card .card-header:hover .eject-btn { opacity: 1; }
  .sub-card .eject-btn:hover { background: var(--border); color: var(--accent); }

  /* Drag & Drop */
  .card.drag-over, .sub-card.drag-over { border-color: var(--accent) !important; background: #2a2818; }
  .card.drag-over > .card-header { background: #2a2818; }
  .card.card-dragging { opacity: 0.3; }
  .drop-indicator {
    height: 3px; background: var(--accent); border-radius: 2px; margin: 2px 0;
    grid-column: 1 / -1;
  }

  /* Hidden cards */
  .card-hidden { border-color: #3a2a2a; }
  .card-hidden .card-title { color: #f85149; }
  .card-hidden .card-header:hover { background: #2a2020; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(2px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw;
  }
  .modal h2 {
    font-family: 'Oswald', sans-serif; font-size: 0.9rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 0.7rem; font-weight: 400; color: var(--text-dim);
    margin-bottom: 5px; letter-spacing: 0.5px;
  }
  .form-group select, .form-group input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 8px 10px; color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 300; outline: none;
    transition: border-color 0.2s;
  }
  .form-group select:focus, .form-group input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn-cancel {
    background: none; color: var(--text-dim); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 14px; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-save {
    background: var(--green); color: #fff; border: none; border-radius: 5px;
    padding: 7px 14px; font-family: inherit; font-size: 13px; font-weight: 400; cursor: pointer;
  }
  .btn-save:hover { background: var(--green-hover); }

  @media (max-width: 768px) {
    .topbar { padding: 10px 16px; gap: 10px; }
    .topbar h1 { font-size: 1rem; letter-spacing: 2px; }
    .stat-bar { padding: 8px 16px; gap: 16px; }
    .main { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
    .kbd { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Links</h1>
  <div class="search-box">
    <span class="search-icon">&#x2315;</span>
    <input type="text" id="search" placeholder="&#xAC80;&#xC0C9;..." oninput="filterLinks()">
    <span class="kbd">/</span>
  </div>
  <button class="btn-add" onclick="openModal()">+ &#xCD94;&#xAC00;</button>
</div>

<div class="stat-bar">
  <div class="stat-item">
    <span class="stat-value" id="total-count">0</span>
    <span class="stat-label">LINKS</span>
  </div>
  <div class="stat-item">
    <span class="stat-value" id="cat-count">0</span>
    <span class="stat-label">CATEGORIES</span>
  </div>
</div>

<div class="main">
  <div class="grid-header">
    <button class="btn-add-cat" onclick="addCategory()">+ &#xCE74;&#xD14C;&#xACE0;&#xB9AC;</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- Add/Edit Link Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-heading">Add Link</h2>
    <div class="form-group">
      <label>카테고리</label>
      <select id="modal-cat"></select>
    </div>
    <div class="form-group">
      <label>링크 이름</label>
      <input type="text" id="modal-title" placeholder="예: GitHub">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="url" id="modal-url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="modal-save-btn" onclick="saveLink()">저장</button>
    </div>
  </div>
</div>

<script>
let data = [];
let unlocked = false;
const SECRET_TRIGGER = "oo";

// Edit state
let editingLinkId = null;

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const json = await res.json();
  if (!res.ok) { throw new Error(json.error || "API 오류"); }
  return json;
}

async function loadData() {
  try {
    data = await api("GET", "/api/data");
    if (!data) data = [];
    render();
  } catch (e) {
    console.error("데이터 로드 실패:", e);
  }
}

function countLinks(cat) {
  let n = (cat.links || []).length;
  (cat.children || []).forEach(c => n += countLinks(c));
  return n;
}

function faviconUrl(url) {
  try {
    const host = new URL(url).hostname;
    return "/api/favicon?domain=" + encodeURIComponent(host);
  } catch { return ""; }
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderChips(links, catId) {
  return (links || []).map(l => {
    const fav = faviconUrl(l.url);
    const favImg = fav ? `<img class="favicon" src="${fav}" alt="" draggable="false" onerror="this.style.display='none'">` : "";
    return `
    <div class="link-chip" draggable="true" data-link-id="${l.id}" data-cat-id="${catId}"
         ondragstart="onChipDragStart(event)" ondragend="onChipDragEnd(event)">
      ${favImg}
      <a href="${escapeHtml(l.url)}" target="_blank" draggable="false">${escapeHtml(l.title)}</a>
      <div class="link-actions">
        <button title="편집" onclick="event.stopPropagation(); editLink(${l.id})">&#x270E;</button>
        <button class="del" title="삭제" onclick="event.stopPropagation(); deleteLink(${l.id})">&#x2715;</button>
      </div>
    </div>`;
  }).join("");
}

function renderSubCard(sub) {
  const chips = renderChips(sub.links, sub.id);
  return `
    <div class="sub-card" data-card-id="${sub.id}"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <div class="card-header" draggable="true"
           ondragstart="onCardDragStart(event, ${sub.id})" ondragend="onCardDragEnd(event)"
           onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="card-title">${escapeHtml(sub.name)}</span>
        <div class="card-right">
          <button class="eject-btn" title="꺼내기" onclick="event.stopPropagation(); ejectSubCard(${sub.id})">&#x2934;</button>
          <span class="badge">${(sub.links||[]).length}</span>
          <span class="chevron">&#x25BE;</span>
        </div>
      </div>
      <div class="card-body">${chips}</div>
    </div>`;
}

function render(filter) {
  const grid = document.getElementById("grid");
  const q = (filter || "").toLowerCase();
  let totalLinks = 0;
  let visibleCats = 0;

  grid.innerHTML = data.map(cat => {
    // hidden mode filter
    if (unlocked && !cat.hidden) return "";
    if (!unlocked && cat.hidden) return "";

    const links = cat.links || [];
    const children = cat.children || [];

    const filteredLinks = links.filter(l =>
      !q || l.title.toLowerCase().includes(q) || cat.name.toLowerCase().includes(q)
    );
    const hasMatchingChildren = children.some(sub =>
      (sub.links||[]).some(l => l.title.toLowerCase().includes(q)) || sub.name.toLowerCase().includes(q)
    );

    if (q && filteredLinks.length === 0 && !hasMatchingChildren && !cat.name.toLowerCase().includes(q)) return "";

    const shownLinks = q && !cat.name.toLowerCase().includes(q) ? filteredLinks : links;
    totalLinks += countLinks(cat);
    visibleCats++;

    const chips = renderChips(shownLinks, cat.id);
    const subCards = children.map(sub => renderSubCard(sub)).join("");

    return `
      <div class="card${cat.hidden ? ' card-hidden' : ''}" data-card-id="${cat.id}"
           ondragover="onCardDragOver(event)" ondragleave="onCardDragLeave(event)" ondrop="onCardDrop(event)">
        <div class="card-header" draggable="true"
             ondragstart="onCardDragStart(event, ${cat.id})" ondragend="onCardDragEnd(event)"
             onclick="toggleCard(this.parentElement)">
          <span class="card-title">${escapeHtml(cat.name)}</span>
          <div class="card-right">
            <span class="badge">${countLinks(cat)}</span>
            <span class="chevron">&#x25BE;</span>
          </div>
        </div>
        <div class="card-body">${chips}${subCards}</div>
      </div>`;
  }).join("");

  document.getElementById("total-count").textContent = totalLinks;
  document.getElementById("cat-count").textContent = visibleCats;
  updateModalCategories();
}

function updateModalCategories() {
  const sel = document.getElementById("modal-cat");
  const cats = [];
  data.forEach(c => {
    if (unlocked && !c.hidden) return;
    if (!unlocked && c.hidden) return;
    cats.push(c);
    (c.children || []).forEach(sub => cats.push(sub));
  });
  sel.innerHTML = cats.map(c => {
    const prefix = c.parent_id ? "  └ " : "";
    return `<option value="${c.id}">${prefix}${escapeHtml(c.name)}</option>`;
  }).join("");
}

function toggleCard(card) { card.classList.toggle("collapsed"); }

function filterLinks() {
  const val = document.getElementById("search").value;
  if (val.toLowerCase() === SECRET_TRIGGER) return;
  render(val);
}

function handleSearchKey(e) {
  if (e.key !== "Enter") return;
  const input = document.getElementById("search");
  const val = input.value.trim().toLowerCase();
  if (val === SECRET_TRIGGER) {
    input.value = "";
    if (unlocked) { unlocked = false; loadData(); return; }
    const pw = prompt("\uD83D\uDD12");
    if (pw === "1234") { unlocked = true; render(); }
  }
}

// --- CRUD ---
function openModal(linkId) {
  editingLinkId = linkId || null;
  const heading = document.getElementById("modal-heading");
  if (editingLinkId) {
    heading.textContent = "Edit Link";
    const link = findLinkById(editingLinkId);
    if (link) {
      document.getElementById("modal-title").value = link.title;
      document.getElementById("modal-url").value = link.url;
      setTimeout(() => { document.getElementById("modal-cat").value = link.category_id; }, 0);
    }
  } else {
    heading.textContent = "Add Link";
    document.getElementById("modal-title").value = "";
    document.getElementById("modal-url").value = "";
  }
  document.getElementById("modal").classList.add("active");
  setTimeout(() => document.getElementById("modal-title").focus(), 100);
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  editingLinkId = null;
}

function findLinkById(id) {
  for (const cat of data) {
    for (const l of (cat.links || [])) { if (l.id === id) return { ...l, category_id: cat.id }; }
    for (const sub of (cat.children || [])) {
      for (const l of (sub.links || [])) { if (l.id === id) return { ...l, category_id: sub.id }; }
    }
  }
  return null;
}

async function saveLink() {
  const catId = parseInt(document.getElementById("modal-cat").value);
  const title = document.getElementById("modal-title").value.trim();
  const url = document.getElementById("modal-url").value.trim();
  if (!title || !url) { alert("제목과 URL을 입력하세요"); return; }

  try {
    if (editingLinkId) {
      await api("PUT", `/api/links/${editingLinkId}`, { title, url, category_id: catId });
    } else {
      await api("POST", "/api/links", { category_id: catId, title, url });
    }
    closeModal();
    await loadData();
  } catch (e) {
    alert("저장 실패: " + e.message);
    location.reload();
  }
}

function editLink(id) { openModal(id); }

async function deleteLink(id) {
  if (!confirm("이 링크를 삭제하시겠습니까?")) return;
  try {
    await api("DELETE", `/api/links/${id}`);
    await loadData();
  } catch (e) {
    alert("삭제 실패: " + e.message);
    location.reload();
  }
}

async function addCategory() {
  const name = prompt("카테고리 이름:");
  if (!name || !name.trim()) return;
  try {
    await api("POST", "/api/categories", { name: name.trim() });
    await loadData();
  } catch (e) {
    alert("생성 실패: " + e.message);
  }
}

async function ejectSubCard(id) {
  try {
    await api("PUT", `/api/categories/${id}/move`, { parent_id: null });
    await loadData();
  } catch (e) {
    alert("꺼내기 실패: " + e.message);
    location.reload();
  }
}

// --- Drag & Drop ---
let dragType = null; // "chip" | "card"
let dragPayload = null;

function onChipDragStart(e) {
  const chip = e.target.closest(".link-chip");
  dragType = "chip";
  dragPayload = { linkId: parseInt(chip.dataset.linkId), catId: parseInt(chip.dataset.catId) };
  chip.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", "");
}

function onChipDragEnd(e) {
  e.target.closest(".link-chip")?.classList.remove("dragging");
  clearDragState();
}

function onCardDragStart(e, catId) {
  dragType = "card";
  dragPayload = { catId };
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", "");
  setTimeout(() => {
    const el = document.querySelector(`[data-card-id="${catId}"]`);
    if (el) el.classList.add("card-dragging");
  }, 0);
}

function onCardDragEnd(e) {
  document.querySelectorAll(".card-dragging").forEach(el => el.classList.remove("card-dragging"));
  clearDragState();
}

// Chip drop on sub-card
function onDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = "move";
  const card = e.target.closest("[data-card-id]");
  if (!card || !dragPayload) return;
  if (parseInt(card.dataset.cardId) === dragPayload.catId) return;
  card.classList.add("drag-over");
}

function onDragLeave(e) {
  e.stopPropagation();
  const card = e.target.closest("[data-card-id]");
  if (card && !card.contains(e.relatedTarget)) card.classList.remove("drag-over");
}

async function onDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const card = e.target.closest("[data-card-id]");
  if (!card || !dragPayload) return;
  card.classList.remove("drag-over");
  const toCatId = parseInt(card.dataset.cardId);
  if (toCatId === dragPayload.catId) return;

  try {
    if (dragType === "chip") {
      await api("PUT", `/api/links/${dragPayload.linkId}/move`, { category_id: toCatId });
    } else if (dragType === "card") {
      await api("PUT", `/api/categories/${dragPayload.catId}/move`, { parent_id: toCatId });
    }
    await loadData();
  } catch (e) {
    alert("이동 실패: " + e.message);
    location.reload();
  }
  dragType = null; dragPayload = null;
}

// Card-level drag: between (reorder) vs on (nest)
function onCardDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  if (!dragPayload) return;
  e.dataTransfer.dropEffect = "move";
  const card = e.target.closest(".card[data-card-id]");
  if (!card) return;
  const cardId = parseInt(card.dataset.cardId);

  if (dragType === "chip") {
    if (cardId === dragPayload.catId) return;
    card.classList.add("drag-over");
    return;
  }

  if (dragType === "card") {
    if (cardId === dragPayload.catId) return;
    const rect = card.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const ratio = y / rect.height;

    // Remove all indicators
    document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
    document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));

    if (ratio < 0.2) {
      // Top: insert before
      const indicator = document.createElement("div");
      indicator.className = "drop-indicator";
      card.parentElement.insertBefore(indicator, card);
    } else if (ratio > 0.8) {
      // Bottom: insert after
      const indicator = document.createElement("div");
      indicator.className = "drop-indicator";
      card.parentElement.insertBefore(indicator, card.nextSibling);
    } else {
      // Center: nest as sub-card
      card.classList.add("drag-over");
    }
  }
}

function onCardDragLeave(e) {
  e.stopPropagation();
  const card = e.target.closest(".card[data-card-id]");
  if (card && !card.contains(e.relatedTarget)) {
    card.classList.remove("drag-over");
    document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
  }
}

async function onCardDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));

  const card = e.target.closest(".card[data-card-id]");
  if (!card || !dragPayload) return;
  const toCatId = parseInt(card.dataset.cardId);

  try {
    if (dragType === "chip") {
      if (toCatId === dragPayload.catId) return;
      await api("PUT", `/api/links/${dragPayload.linkId}/move`, { category_id: toCatId });
      await loadData();
      return;
    }

    if (dragType === "card") {
      if (toCatId === dragPayload.catId) return;
      const rect = card.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const ratio = y / rect.height;

      if (ratio >= 0.2 && ratio <= 0.8) {
        // Nest as sub-card
        await api("PUT", `/api/categories/${dragPayload.catId}/move`, { parent_id: toCatId });
      } else {
        // Reorder: compute new order
        const visibleCards = [...document.querySelectorAll(".grid > .card[data-card-id]")];
        const ids = visibleCards.map(c => parseInt(c.dataset.cardId)).filter(id => id !== dragPayload.catId);
        const targetIdx = ids.indexOf(toCatId);
        if (targetIdx < 0) return;

        if (ratio < 0.2) {
          ids.splice(targetIdx, 0, dragPayload.catId);
        } else {
          ids.splice(targetIdx + 1, 0, dragPayload.catId);
        }
        await api("PUT", "/api/categories/reorder", { parent_id: null, ordered_ids: ids });
      }
      await loadData();
    }
  } catch (err) {
    alert("이동 실패: " + err.message);
    location.reload();
  }
  dragType = null; dragPayload = null;
}

function clearDragState() {
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
  document.querySelectorAll(".drop-indicator").forEach(el => el.remove());
  dragType = null;
  dragPayload = null;
}

// --- Keyboard ---
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "/" && !e.target.closest("input,select,textarea")) {
    e.preventDefault();
    document.getElementById("search").focus();
  }
});

document.getElementById("search").addEventListener("keydown", handleSearchKey);

// --- Init ---
loadData();
</script>
